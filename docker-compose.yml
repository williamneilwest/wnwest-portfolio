services:

  db:
    image: postgres:15
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: westos
      POSTGRES_USER: westos
      POSTGRES_PASSWORD: westos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - westos

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_ENV: ${BACKEND_FLASK_ENV}
      GUNICORN_BIND: ${BACKEND_GUNICORN_BIND}
      APP_NAME: ${BACKEND_APP_NAME:-westOS API}
      BACKEND_DATA_DIR: ${BACKEND_DATA_DIR:-/app/data}
      AI_GATEWAY_STATUS_URL: http://ai-gateway:${AI_GATEWAY_PORT}/health
      USE_AI_GATEWAY: ${USE_AI_GATEWAY}
      AI_GATEWAY_BASE_URL: http://ai-gateway:${AI_GATEWAY_PORT}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ACTIVE_TICKETS_PATH: ${ACTIVE_TICKETS_PATH}
      POWER_AUTOMATE_GROUP_SEARCH_URL: ${POWER_AUTOMATE_GROUP_SEARCH_URL:-}
      POWER_AUTOMATE_GROUP_SCRIPT_NAME: ${POWER_AUTOMATE_GROUP_SCRIPT_NAME:-Search Groups}
      POWER_AUTOMATE_USER_GROUPS_SCRIPT_NAME: ${POWER_AUTOMATE_USER_GROUPS_SCRIPT_NAME:-Get User Groups}
      POWER_AUTOMATE_GROUP_TIMEOUT_SECONDS: ${POWER_AUTOMATE_GROUP_TIMEOUT_SECONDS:-20}
      GUNICORN_CMD_ARGS: ${BACKEND_GUNICORN_CMD_ARGS:-}
    expose:
      - "${BACKEND_PORT}"
    volumes:
      - ./data:/app/data
      - ./frontend/dist:/app/frontend/dist:ro
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - westos

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - westos

  ai-gateway:
    build:
      context: ./ai-gateway
    container_name: ai-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_ENV: ${AI_FLASK_ENV}
      GUNICORN_BIND: ${AI_GUNICORN_BIND}
      GUNICORN_TIMEOUT: ${AI_GUNICORN_TIMEOUT}
      GUNICORN_GRACEFUL_TIMEOUT: ${AI_GUNICORN_GRACEFUL_TIMEOUT}
      APP_NAME: ${AI_APP_NAME:-westOS AI Gateway}
      LITELLM_MODEL: openai/gpt-4o
      LITELLM_TEMPERATURE: ${LITELLM_TEMPERATURE}
      LITELLM_MAX_TOKENS: ${LITELLM_MAX_TOKENS}
      OLLAMA_API_BASE: ""
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "${AI_GATEWAY_PORT}"
    networks:
      - westos

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./services/ollama:/root/.ollama
    networks:
      - westos

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      WEBUI_AUTH: "False"
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - westos

  caddy:
    image: caddy:2.8.4
    container_name: caddy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CADDY_BASIC_AUTH_USER: ${CADDY_BASIC_AUTH_USER}
      CADDY_BASIC_AUTH_HASH: ${CADDY_BASIC_AUTH_HASH}
    depends_on:
      - backend
      - frontend
      - ai-gateway
      - ollama
      - open-webui
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - westos

networks:
  westos:
    name: westos

volumes:
  caddy_data:
  caddy_config:
  open_webui_data:
  postgres_data:
